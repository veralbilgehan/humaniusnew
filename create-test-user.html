<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kullanıcısı Oluştur</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Test Kullanıcısı Oluşturuluyor...</h1>
    <div id="result"></div>

    <script>
        const supabaseUrl = 'https://thrujipopsykboetnqnx.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRocnVqaXBvcHN5a2JvZXRucW54Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzEwODkzMzUsImV4cCI6MjA4NjY2NTMzNX0.bF3Jzp1ALJJ5SZF_B0o201p47IxZGll5dNvpDNzfWik';

        const supabase = supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function createTestUser() {
            const resultDiv = document.getElementById('result');

            try {
                // Önce şirketi al
                const { data: companies, error: companyError } = await supabase
                    .from('companies')
                    .select('id')
                    .limit(1);

                if (companyError) throw companyError;

                const companyId = companies[0]?.id;

                if (!companyId) {
                    resultDiv.innerHTML = '<p style="color: red;">Şirket bulunamadı!</p>';
                    return;
                }

                // Kullanıcı oluştur
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: 'admin@test.com',
                    password: '123456',
                    options: {
                        data: {
                            full_name: 'Admin Kullanıcı'
                        }
                    }
                });

                if (authError) throw authError;

                if (authData.user) {
                    // Profile oluştur
                    const { error: profileError } = await supabase
                        .from('profiles')
                        .insert({
                            id: authData.user.id,
                            email: 'admin@test.com',
                            full_name: 'Admin Kullanıcı',
                            company_id: companyId,
                            role: 'admin'
                        });

                    if (profileError) throw profileError;

                    resultDiv.innerHTML = `
                        <div style="color: green;">
                            <h2>✅ Test kullanıcısı başarıyla oluşturuldu!</h2>
                            <p><strong>Email:</strong> admin@test.com</p>
                            <p><strong>Şifre:</strong> 123456</p>
                            <p><strong>Rol:</strong> Admin</p>
                            <p style="margin-top: 20px;">Şimdi giriş sayfasına gidip bu bilgilerle giriş yapabilirsiniz.</p>
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p style="color: red;">Hata: ${error.message}</p>`;
                console.error('Error:', error);
            }
        }

        createTestUser();
    </script>
</body>
</html>
