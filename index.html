<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/humanius-original.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Humanius - Kapsamlı İnsan Kaynakları Yönetim Sistemi: Bordro, PDKS, İzin, Performans, ATS ve AI Analitik." />
    <meta name="theme-color" content="#4f46e5" />
    <title>Humanius — İK Yönetim Sistemi</title>
    <!-- Material Symbols — AI Tarayıcı bileşeni için gerekli -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <!-- Google Sans — AI Tarayıcı dark tema fontu -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Google+Sans+Mono&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var rootMounted = false;
        var timer = setTimeout(function () {
          if (rootMounted) return;
          var box = document.createElement('div');
          box.style.cssText = 'position:fixed;inset:16px;z-index:99999;padding:16px;border:1px solid #f5c2c7;background:#f8d7da;color:#842029;border-radius:12px;font-family:Arial,sans-serif;line-height:1.5';
          box.innerHTML = '<strong>Uygulama yuklenemedi.</strong><br/>Muhtemel neden: JS/CSS dosyalari (assets) yuklenemiyor veya sunucu yanlis MIME donuyor.<br/>Lutfen tarayici Console ve Network sekmesinde ilk hatayi kontrol edin.';
          document.body.appendChild(box);
        }, 3500);

        window.addEventListener('error', function (event) {
          if (!event || !event.target) return;
          var target = event.target;
          if (target.tagName === 'SCRIPT' || target.tagName === 'LINK') {
            clearTimeout(timer);
          }
        }, true);

        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.childElementCount > 0) {
            rootMounted = true;
            clearTimeout(timer);
            observer.disconnect();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
